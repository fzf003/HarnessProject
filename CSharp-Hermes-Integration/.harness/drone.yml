kind: pipeline
type: docker
name: dotnet-api-ci

steps:
  - name: restore
    image: mcr.microsoft.com/dotnet/sdk:8.0
    commands:
      - dotnet restore --locked-mode

  - name: build
    image: mcr.microsoft.com/dotnet/sdk:8.0
    commands:
      - dotnet build -c Release --no-restore

  - name: test
    image: mcr.microsoft.com/dotnet/sdk:8.0
    commands:
      - dotnet test --no-build --logger "trx;LogFileName=test-results.trx"

  - name: publish
    image: mcr.microsoft.com/dotnet/sdk:8.0
    commands:
      - dotnet publish -c Release --no-build -o /artifacts
    volumes:
      - name: artifacts
        path: /artifacts

  - name: docker-build
    image: plugins/docker
    settings:
      repo: local-registry/dotnet-api
      tags: latest
      dockerfile: Dockerfile
      context: /artifacts
    when:
      branch: [ main ]

volumes:
  - name: artifacts
    temp: {}